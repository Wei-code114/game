<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Game Hub</title>
  <link rel="stylesheet" href="./hub.css">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="hero__eyebrow">MINI GAME HUB</p>
      <h1>小遊戲樂園</h1>

    </section>
    <section id="menu" class="view view--active">
      <div class="game-grid">
        <button class="game-card" type="button" data-open="guess">
          <span class="game-card__icon">🔢</span>
          <strong>猜數字</strong>
          <span>1 到 100，看看幾次猜中。</span>
        </button>
        <button class="game-card" type="button" data-open="rps">
          <span class="game-card__icon">✂️</span>
          <strong>剪刀石頭布</strong>
          <span>快速一局，累積勝負平。</span>
        </button>
        <button class="game-card" type="button" data-open="memory">
          <span class="game-card__icon">🃏</span>
          <strong>翻卡遊戲</strong>
          <span>翻出相同圖案，完成配對。</span>
        </button>
        <button class="game-card" type="button" data-open="snake">
          <span class="game-card__icon">🐍</span>
          <strong>貪吃蛇</strong>
          <span>吃食物、變長、別撞牆。</span>
        </button>
      </div>
    </section>
    <section id="guess-view" class="view panel">
      <div class="panel__top">
        <div>
          <p class="panel__eyebrow">NUMBER GAME</p>
          <h2>猜數字</h2>
        </div>
        <button class="button button--ghost" type="button" data-back>返回選單</button>
      </div>
      <div class="stats">
        <article class="stat-card">
          <span class="stat-card__label">範圍</span>
          <strong>1 - 100</strong>
        </article>
        <article class="stat-card">
          <span class="stat-card__label">次數</span>
          <strong id="guess-times">0</strong>
        </article>
      </div>
      <div class="play-area">
        <label class="input-panel" for="guess-input">
          <span>輸入你的猜測</span>
          <input id="guess-input" type="number" min="1" max="100" placeholder="例如 42">
        </label>
      </div>
      <div class="action-row">
        <button id="guess-submit" class="button" type="button">猜看看</button>
        <button id="guess-restart" class="button button--accent" type="button">重新開始</button>
      </div>
      <p id="guess-message" class="message"></p>
    </section>
    <section id="rps-view" class="view panel">
      <div class="panel__top">
        <div>
          <p class="panel__eyebrow">RPS GAME</p>
          <h2>剪刀石頭布</h2>
        </div>
        <button class="button button--ghost" type="button" data-back>返回選單</button>
      </div>
      <div class="stats">
        <article class="stat-card">
          <span class="stat-card__label">勝</span>
          <strong id="rps-win">0</strong>
        </article>
        <article class="stat-card">
          <span class="stat-card__label">輸</span>
          <strong id="rps-lose">0</strong>
        </article>
        <article class="stat-card">
          <span class="stat-card__label">平</span>
          <strong id="rps-draw">0</strong>
        </article>
      </div>
      <div class="choice-row">
        <button class="choice-button" type="button" data-rps="剪刀">✂️<span>剪刀</span></button>
        <button class="choice-button" type="button" data-rps="石頭">🪨<span>石頭</span></button>
        <button class="choice-button" type="button" data-rps="布">📄<span>布</span></button>
      </div>
      <div class="action-row">
        <button id="rps-reset" class="button button--accent" type="button">重新開始</button>
      </div>
      <p id="rps-message" class="message"></p>
    </section>
    <section id="memory-view" class="view panel">
      <div class="panel__top">
        <div>
          <p class="panel__eyebrow">MEMORY GAME</p>
          <h2>翻卡遊戲</h2>
        </div>
        <button class="button button--ghost" type="button" data-back>返回選單</button>
      </div>
      <div class="stats">
        <article class="stat-card">
          <span class="stat-card__label">翻牌次數</span>
          <strong id="memory-flips">0</strong>
        </article>
        <article class="stat-card">
          <span class="stat-card__label">配對完成</span>
          <strong id="memory-matched">0 / 8</strong>
        </article>
      </div>
      <div id="memory-board" class="memory-board" aria-label="翻卡遊戲版面"></div>
      <div class="action-row">
        <button id="memory-restart" class="button button--accent" type="button">重新開始</button>
      </div>
      <p id="memory-message" class="message"></p>
    </section>
    <section id="snake-view" class="view panel">
      <div class="panel__top">
        <div>
          <p class="panel__eyebrow">CLASSIC SNAKE</p>
          <h2>貪吃蛇</h2>
        </div>
        <button class="button button--ghost" type="button" data-back>返回選單</button>
      </div>
      <div class="stats">
        <article class="stat-card">
          <span class="stat-card__label">分數</span>
          <strong id="snake-score">0</strong>
        </article>
        <article class="stat-card">
          <span class="stat-card__label">狀態</span>
          <strong id="snake-status">準備中</strong>
        </article>
      </div>
      <div class="play-area">
        <div id="snake-board" class="snake-board" role="grid" aria-label="貪吃蛇遊戲版面" tabindex="0"></div>
      </div>
      <p class="hint">按一下棋盤後可用方向鍵或 WASD 控制，也可以直接點下方按鈕。</p>
      <div class="action-row">
        <button id="snake-toggle" class="button" type="button">開始</button>
        <button id="snake-restart" class="button button--accent" type="button">重新開始</button>
      </div>
      <div class="snake-controls" aria-label="貪吃蛇方向控制">
        <button class="control-button" type="button" data-direction="up">上</button>
        <div class="snake-controls__row">
          <button class="control-button" type="button" data-direction="left">左</button>
          <button class="control-button" type="button" data-direction="down">下</button>
          <button class="control-button" type="button" data-direction="right">右</button>
        </div>
      </div>
    </section>
  </main>
  <script src="./hub.js"></script>
</body>
</html>
